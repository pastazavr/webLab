services:

  # ── PostgreSQL ────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: cafe_postgres
    environment:
      POSTGRES_DB: cafedb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1
    ports:
      - "5432:5432"          # доступен с хоста для отладки
    volumes:
      - postgres_data:/var/lib/postgresql/data   # данные сохраняются между перезапусками
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cafedb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s      # ждём полной инициализации PostgreSQL

  # ── Spring Boot приложение ────────────────────────────────────
  app:
    build: .                 # собирается из Dockerfile в корне проекта
    container_name: cafe_app
    ports:
      - "8080:8080"          # сайт доступен на http://localhost:8080
    environment:
      SPRING_PROFILES_ACTIVE: docker   # активирует application-docker.properties
    depends_on:
      db:
        condition: service_healthy     # ждёт готовности PostgreSQL перед стартом
    restart: on-failure                # перезапуск при аварийном завершении

# ── Тома ─────────────────────────────────────────────────────────
volumes:
  postgres_data:             # именованный том для хранения данных PostgreSQL
