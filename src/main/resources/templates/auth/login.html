<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head th:replace="~{fragments/head :: head('Вход')}"></head>
<body class="d-flex flex-column min-vh-100" style="background:#faf6f0;">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="container py-5 flex-grow-1 d-flex align-items-center justify-content-center">
    <div class="col-sm-10 col-md-6 col-lg-4">
        <div class="text-center mb-4">
            <i class="fas fa-mug-hot fa-3x" style="color:#d4a96a;"></i>
            <h2 class="fw-bold mt-3 mb-1" style="font-family:'Playfair Display',serif;">Войти в аккаунт</h2>
            <p class="text-muted small">Введите свои данные для входа</p>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <div class="alert alert-danger small" th:if="${errorMsg}" th:text="${errorMsg}"></div>
                <div class="alert alert-success small" th:if="${successMsg}" th:text="${successMsg}"></div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Имя пользователя</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="fas fa-user text-muted"></i></span>
                            <input type="text" name="username" class="form-control"
                                   placeholder="admin" autofocus required/>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Пароль</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="fas fa-lock text-muted"></i></span>
                            <input type="password" name="password" class="form-control"
                                   placeholder="••••••••" required/>
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-lg py-3 fw-bold"
                                style="background:#8c6239; color:#fff;">
                            <i class="fas fa-sign-in-alt me-2"></i>Войти
                        </button>
                    </div>
                </form>

                <div class="text-center mt-3">
                    <small class="text-muted">Нет аккаунта?
                        <a th:href="@{/register}" class="text-decoration-none fw-semibold"
                           style="color:#8c6239;">Зарегистрироваться</a>
                    </small>
                </div>
            </div>
        </div>

        <!-- Demo credentials hint -->
        <div class="card border-0 mt-3" style="background:#fff8f0;">
            <div class="card-body p-3 small">
                <p class="fw-semibold mb-2 text-muted"><i class="fas fa-info-circle me-1"></i>Демо-доступ:</p>
                <div class="d-flex gap-3">
                    <div>
                        <span class="badge" style="background:#2c1810;">Администратор</span><br>
                        <code class="small">admin / admin123</code>
                    </div>
                    <div>
                        <span class="badge bg-secondary">Пользователь</span><br>
                        <code class="small">user / user123</code>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
