<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head th:replace="~{fragments/head :: head('Регистрация')}"></head>
<body class="d-flex flex-column min-vh-100" style="background:#faf6f0;">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="container py-5 flex-grow-1 d-flex align-items-center justify-content-center">
    <div class="col-sm-10 col-md-6 col-lg-5">
        <div class="text-center mb-4">
            <i class="fas fa-user-plus fa-3x" style="color:#d4a96a;"></i>
            <h2 class="fw-bold mt-3 mb-1" style="font-family:'Playfair Display',serif;">Создать аккаунт</h2>
            <p class="text-muted small">Зарегистрируйтесь, чтобы оставлять отзывы</p>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <div class="alert alert-danger small" th:if="${errorMsg}" th:text="${errorMsg}"></div>

                <form th:action="@{/register}" th:object="${userDto}" method="post" novalidate>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Имя пользователя <span class="text-danger">*</span></label>
                        <input type="text" class="form-control"
                               th:field="*{username}"
                               th:classappend="${#fields.hasErrors('username')} ? ' is-invalid'"
                               placeholder="minLength: 3 символа" autofocus/>
                        <div class="invalid-feedback" th:errors="*{username}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Пароль <span class="text-danger">*</span></label>
                        <input type="password" class="form-control"
                               th:field="*{password}"
                               th:classappend="${#fields.hasErrors('password')} ? ' is-invalid'"
                               placeholder="Минимум 6 символов"/>
                        <div class="invalid-feedback" th:errors="*{password}"></div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Подтвердите пароль <span class="text-danger">*</span></label>
                        <input type="password" class="form-control"
                               th:field="*{confirmPassword}"
                               th:classappend="${#fields.hasErrors('confirmPassword')} ? ' is-invalid'"
                               placeholder="Повторите пароль"/>
                        <div class="invalid-feedback" th:errors="*{confirmPassword}"></div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-lg py-3 fw-bold"
                                style="background:#8c6239; color:#fff;">
                            <i class="fas fa-user-plus me-2"></i>Зарегистрироваться
                        </button>
                    </div>
                </form>

                <div class="text-center mt-3">
                    <small class="text-muted">Уже есть аккаунт?
                        <a th:href="@{/login}" class="text-decoration-none fw-semibold"
                           style="color:#8c6239;">Войти</a>
                    </small>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
