<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head th:replace="~{fragments/head :: head('Ошибка')}"></head>
<body class="d-flex flex-column min-vh-100" style="background:#faf6f0;">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="container py-5 flex-grow-1 d-flex align-items-center justify-content-center">
    <div class="text-center">
        <div class="display-1 fw-bold mb-3" style="color:#d4a96a; font-family:'Playfair Display',serif;"
             th:text="${status}">404</div>
        <h2 class="fw-bold mb-3" style="font-family:'Playfair Display',serif;"
            th:text="${status == 404} ? 'Страница не найдена' : (${status == 403} ? 'Доступ запрещён' : 'Произошла ошибка')">
            Страница не найдена
        </h2>
        <p class="text-muted mb-4" th:text="${message ?: 'Запрашиваемая страница не существует или была удалена.'}">
            Запрашиваемая страница не существует или была удалена.
        </p>
        <a th:href="@{/}" class="btn btn-lg px-5 py-3 fw-bold"
           style="background:#8c6239; color:#fff;">
            <i class="fas fa-home me-2"></i>На главную
        </a>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
