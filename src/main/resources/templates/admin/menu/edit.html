<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head th:replace="~{fragments/head :: head(${isNew} ? 'Добавить позицию' : 'Редактировать позицию')}"></head>
<body class="d-flex flex-column min-vh-100" style="background:#f8f5f2;">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="container py-4 flex-grow-1">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb small">
            <li class="breadcrumb-item"><a th:href="@{/admin}" class="text-decoration-none">Панель</a></li>
            <li class="breadcrumb-item"><a th:href="@{/admin/menu}" class="text-decoration-none">Меню</a></li>
            <li class="breadcrumb-item active" th:text="${isNew} ? 'Добавить' : 'Редактировать'">Добавить</li>
        </ol>
    </nav>

    <div class="row justify-content-center">
        <div class="col-lg-7">
            <h3 class="fw-bold mb-4" style="font-family:'Playfair Display',serif;"
                th:text="${isNew} ? 'Добавить позицию в меню' : 'Редактировать: ' + ${item.name}">Заголовок</h3>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form th:action="${isNew} ? @{/admin/menu/create} : @{/admin/menu/{id}/update(id=${item.id})}"
                          th:object="${item}" method="post">

                        <div class="row g-3 mb-3">
                            <div class="col-md-7">
                                <label class="form-label fw-semibold">Название <span class="text-danger">*</span></label>
                                <input type="text" class="form-control"
                                       th:field="*{name}"
                                       th:classappend="${#fields.hasErrors('name')} ? ' is-invalid'"
                                       placeholder="Капучино"/>
                                <div class="invalid-feedback" th:errors="*{name}"></div>
                            </div>
                            <div class="col-md-5">
                                <label class="form-label fw-semibold">Категория <span class="text-danger">*</span></label>
                                <select class="form-select"
                                        th:field="*{category}"
                                        th:classappend="${#fields.hasErrors('category')} ? ' is-invalid'">
                                    <option value="">— Выберите —</option>
                                    <option th:each="cat : ${categories}"
                                            th:value="${cat}"
                                            th:text="${cat}">Категория</option>
                                </select>
                                <div class="invalid-feedback" th:errors="*{category}"></div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Описание</label>
                            <textarea class="form-control" th:field="*{description}" rows="3"
                                      placeholder="Нежная смесь эспрессо и взбитого молока..."></textarea>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Цена (₽) <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <input type="number" class="form-control"
                                           th:field="*{price}"
                                           th:classappend="${#fields.hasErrors('price')} ? ' is-invalid'"
                                           step="0.01" min="0" placeholder="250"/>
                                    <span class="input-group-text">₽</span>
                                    <div class="invalid-feedback" th:errors="*{price}"></div>
                                </div>
                            </div>
                            <div class="col-md-8">
                                <label class="form-label fw-semibold">URL изображения</label>
                                <input type="text" class="form-control" th:field="*{imageUrl}"
                                       placeholder="https://picsum.photos/seed/coffee/400/300"/>
                            </div>
                        </div>

                        <div class="mb-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" role="switch"
                                       th:field="*{available}" id="availableCheck"/>
                                <label class="form-check-label fw-semibold" for="availableCheck">
                                    Доступно для заказа
                                </label>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn px-4 fw-semibold"
                                    style="background:#8c6239; color:#fff;"
                                    th:text="${isNew} ? 'Добавить позицию' : 'Сохранить изменения'">Сохранить</button>
                            <a th:href="@{/admin/menu}" class="btn btn-outline-secondary">Отмена</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
