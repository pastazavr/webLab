<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head th:replace="~{fragments/head :: head(${isNew} ? 'Новая страница' : 'Редактировать страницу')}"></head>
<body class="d-flex flex-column min-vh-100" style="background:#f8f5f2;">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="container py-4 flex-grow-1">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb small">
            <li class="breadcrumb-item"><a th:href="@{/admin}" class="text-decoration-none">Панель</a></li>
            <li class="breadcrumb-item"><a th:href="@{/admin/pages}" class="text-decoration-none">Страницы</a></li>
            <li class="breadcrumb-item active" th:text="${isNew} ? 'Новая' : 'Редактировать'">Новая</li>
        </ol>
    </nav>

    <div class="row justify-content-center">
        <div class="col-lg-9">
            <h3 class="fw-bold mb-4" style="font-family:'Playfair Display',serif;"
                th:text="${isNew} ? 'Создать страницу' : 'Редактировать: ' + ${page.title}">Заголовок</h3>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form th:action="${isNew} ? @{/admin/pages/create} : @{/admin/pages/{id}/update(id=${page.id})}"
                          th:object="${page}" method="post">

                        <div class="row g-3 mb-3">
                            <div class="col-md-7">
                                <label class="form-label fw-semibold">Заголовок <span class="text-danger">*</span></label>
                                <input type="text" class="form-control"
                                       th:field="*{title}"
                                       th:classappend="${#fields.hasErrors('title')} ? ' is-invalid'"
                                       placeholder="Акции и новости"
                                       id="titleInput"/>
                                <div class="invalid-feedback" th:errors="*{title}"></div>
                            </div>
                            <div class="col-md-5">
                                <label class="form-label fw-semibold">
                                    Slug (URL-адрес) <span class="text-danger">*</span>
                                    <i class="fas fa-question-circle text-muted ms-1" data-bs-toggle="tooltip"
                                       title="Только строчные латинские буквы, цифры и дефисы. Пример: nashi-aktsii"></i>
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text text-muted small">/pages/</span>
                                    <input type="text" class="form-control font-monospace"
                                           th:field="*{slug}"
                                           th:classappend="${#fields.hasErrors('slug')} ? ' is-invalid'"
                                           placeholder="nashi-aktsii"
                                           id="slugInput"/>
                                    <div class="invalid-feedback" th:errors="*{slug}"></div>
                                </div>
                                <div class="form-text">
                                    <button type="button" class="btn btn-link btn-sm p-0 text-muted" id="generateSlug">
                                        Сгенерировать из заголовка
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Содержимое (HTML)</label>
                            <textarea class="form-control font-monospace"
                                      th:field="*{content}"
                                      rows="14"
                                      placeholder="&lt;p&gt;Текст страницы...&lt;/p&gt;&#10;&lt;ul&gt;&lt;li&gt;Пункт 1&lt;/li&gt;&lt;/ul&gt;"></textarea>
                            <div class="form-text">Поддерживается HTML. Используйте Bootstrap-классы для стилизации.</div>
                        </div>

                        <div class="mb-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" role="switch"
                                       th:field="*{visible}" id="visibleCheck"/>
                                <label class="form-check-label fw-semibold" for="visibleCheck">
                                    Страница видна посетителям
                                </label>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn px-4 fw-semibold"
                                    style="background:#8c6239; color:#fff;"
                                    th:text="${isNew} ? 'Создать страницу' : 'Сохранить изменения'">Сохранить</button>
                            <a th:href="@{/admin/pages}" class="btn btn-outline-secondary">Отмена</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Auto-generate slug from title (transliteration helpers)
document.getElementById('generateSlug')?.addEventListener('click', function () {
    const title = document.getElementById('titleInput').value;
    const slug = title
        .toLowerCase()
        .replace(/[а-яё]/g, c => ({а:'a',б:'b',в:'v',г:'g',д:'d',е:'e',ё:'yo',ж:'zh',з:'z',и:'i',й:'y',к:'k',л:'l',м:'m',н:'n',о:'o',п:'p',р:'r',с:'s',т:'t',у:'u',ф:'f',х:'kh',ц:'ts',ч:'ch',ш:'sh',щ:'shch',ъ:'',ы:'y',ь:'',э:'e',ю:'yu',я:'ya'}[c] || c))
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '');
    document.getElementById('slugInput').value = slug;
});
// Bootstrap tooltips
document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(el => {
    new bootstrap.Tooltip(el);
});
</script>
</body>
</html>
