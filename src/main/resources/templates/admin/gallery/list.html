<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head th:replace="~{fragments/head :: head('Управление галереей')}"></head>
<body class="d-flex flex-column min-vh-100" style="background:#f8f5f2;">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="container py-4 flex-grow-1">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb small">
            <li class="breadcrumb-item"><a th:href="@{/admin}" class="text-decoration-none">Панель</a></li>
            <li class="breadcrumb-item active">Галерея</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold mb-0" style="font-family:'Playfair Display',serif;">
            <i class="fas fa-images me-2" style="color:#d4a96a;"></i>Управление галереей
        </h3>
        <a th:href="@{/admin/gallery/new}" class="btn btn-success">
            <i class="fas fa-plus me-2"></i>Добавить фото
        </a>
    </div>

    <div class="alert alert-success alert-dismissible fade show" th:if="${success}" th:text="${success}">
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-3" th:if="${items != null and !#lists.isEmpty(items)}">
        <div class="col-sm-6 col-md-4 col-lg-3" th:each="item : ${items}">
            <div class="card border-0 shadow-sm h-100">
                <div class="position-relative overflow-hidden" style="height:160px;">
                    <img th:src="${item.imageUrl}" th:alt="${item.title}"
                         class="w-100 h-100"
                         style="object-fit:cover;"
                         onerror="this.src='https://picsum.photos/seed/cafe/400/300'"/>
                    <div class="position-absolute top-0 start-0 m-2">
                        <span class="badge" style="background:#2c1810; opacity:.85;"
                              th:text="'#' + ${item.orderIndex}">#0</span>
                    </div>
                </div>
                <div class="card-body py-2 px-3">
                    <h6 class="card-title mb-1 fw-semibold small" th:text="${item.title}">Заголовок</h6>
                    <p class="card-text text-muted" style="font-size:.75rem;"
                       th:text="${item.description != null and !item.description.isEmpty()} ? ${#strings.abbreviate(item.description,60)} : '—'">—</p>
                </div>
                <div class="card-footer bg-white border-0 d-flex gap-2 pb-3 px-3">
                    <a th:href="@{/admin/gallery/{id}/edit(id=${item.id})}"
                       class="btn btn-sm btn-outline-secondary flex-grow-1">
                        <i class="fas fa-edit me-1"></i>Изменить
                    </a>
                    <form th:action="@{/admin/gallery/{id}/delete(id=${item.id})}"
                          method="post"
                          onsubmit="return confirm('Удалить фото?')">
                        <button class="btn btn-sm btn-outline-danger" type="submit">
                            <i class="fas fa-trash"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${items == null or #lists.isEmpty(items)}" class="text-center py-5 text-muted">
        <i class="fas fa-images fa-3x d-block mb-3 opacity-25"></i>
        <p>Галерея пуста.</p>
        <a th:href="@{/admin/gallery/new}" class="btn btn-success">Добавить первое фото</a>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
