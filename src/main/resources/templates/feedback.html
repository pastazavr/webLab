<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head th:replace="~{fragments/head :: head('Обратная связь')}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="page-hero text-white text-center py-5" style="background:linear-gradient(135deg,#2c1810,#8c6239);">
    <div class="container py-3">
        <h1 class="display-5 fw-bold mb-2" style="font-family:'Playfair Display',serif;">Обратная связь</h1>
        <p class="lead opacity-75 mb-0">Мы ценим каждый отзыв и стремимся стать лучше</p>
    </div>
</div>

<main class="container py-5 flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-lg-7">

            <!-- Success alert -->
            <div class="alert alert-success alert-dismissible fade show" role="alert"
                 th:if="${success}" th:text="${success}">
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 p-md-5">
                    <h4 class="fw-bold mb-1" style="font-family:'Playfair Display',serif;">Напишите нам</h4>
                    <p class="text-muted mb-4">Отзыв, вопрос или бронирование столика — мы ответим в течение 24 часов.</p>

                    <form th:action="@{/feedback}" th:object="${feedbackMessage}" method="post" novalidate>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Ваше имя <span class="text-danger">*</span></label>
                            <input type="text" class="form-control"
                                   th:field="*{name}"
                                   th:classappend="${#fields.hasErrors('name')} ? ' is-invalid'"
                                   placeholder="Иван Петров"/>
                            <div class="invalid-feedback" th:errors="*{name}"></div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
                                <input type="email" class="form-control"
                                       th:field="*{email}"
                                       th:classappend="${#fields.hasErrors('email')} ? ' is-invalid'"
                                       placeholder="ivan@example.com"/>
                                <div class="invalid-feedback" th:errors="*{email}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Телефон</label>
                                <input type="tel" class="form-control"
                                       th:field="*{phone}"
                                       placeholder="+7 (___) ___-__-__"/>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Сообщение <span class="text-danger">*</span></label>
                            <textarea class="form-control"
                                      th:field="*{message}"
                                      th:classappend="${#fields.hasErrors('message')} ? ' is-invalid'"
                                      rows="5"
                                      placeholder="Ваш отзыв, вопрос или пожелание..."></textarea>
                            <div class="invalid-feedback" th:errors="*{message}"></div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-lg py-3 fw-bold"
                                    style="background:#8c6239; color:#fff;">
                                <i class="fas fa-paper-plane me-2"></i>Отправить сообщение
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Info cards below form -->
            <div class="row g-3 mt-4">
                <div class="col-sm-4 text-center p-3">
                    <i class="fas fa-clock fa-lg mb-2 d-block" style="color:#8c6239;"></i>
                    <small class="fw-semibold d-block">Время ответа</small>
                    <small class="text-muted">до 24 часов</small>
                </div>
                <div class="col-sm-4 text-center p-3">
                    <i class="fas fa-phone fa-lg mb-2 d-block" style="color:#8c6239;"></i>
                    <small class="fw-semibold d-block">Телефон</small>
                    <small class="text-muted">+7 (495) 123-45-67</small>
                </div>
                <div class="col-sm-4 text-center p-3">
                    <i class="fas fa-map-marker-alt fa-lg mb-2 d-block" style="color:#8c6239;"></i>
                    <small class="fw-semibold d-block">Адрес</small>
                    <small class="text-muted">ул. Кофейная, 42</small>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
