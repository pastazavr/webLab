<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark sticky-top" style="background-color:#2c1810;">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
            <i class="fas fa-mug-hot fs-4" style="color:#d4a96a;"></i>
            <span class="fw-bold fs-5" style="font-family:'Playfair Display',serif;">Кафе Уют</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain"
                aria-controls="navbarMain" aria-expanded="false" aria-label="Меню">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}"
                       th:classappend="${currentPage == 'home'} ? ' active'">Главная</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/menu}"
                       th:classappend="${currentPage == 'menu'} ? ' active'">Меню</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/gallery}"
                       th:classappend="${currentPage == 'gallery'} ? ' active'">Галерея</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/contacts}"
                       th:classappend="${currentPage == 'contacts'} ? ' active'">Контакты</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/feedback}"
                       th:classappend="${currentPage == 'feedback'} ? ' active'">Обратная связь</a>
                </li>
                <!-- Dynamic pages -->
                <li class="nav-item dropdown" th:if="${dynamicPages != null and !#lists.isEmpty(dynamicPages)}">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                        Страницы
                    </a>
                    <ul class="dropdown-menu">
                        <li th:each="dp : ${dynamicPages}">
                            <a class="dropdown-item"
                               th:href="@{/pages/{slug}(slug=${dp.slug})}"
                               th:text="${dp.title}">Страница</a>
                        </li>
                    </ul>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto gap-1">
                <!-- Admin panel link -->
                <li class="nav-item" th:if="${isAdmin}">
                    <a class="nav-link px-2 py-1 rounded" th:href="@{/admin}"
                       style="color:#d4a96a; border:1px solid #d4a96a;">
                        <i class="fas fa-cog me-1"></i>Панель
                    </a>
                </li>
                <!-- Logged in user -->
                <li class="nav-item d-flex align-items-center" th:if="${isAuthenticated}">
                    <span class="navbar-text me-2 small text-muted">
                        <i class="fas fa-user me-1"></i>
                        <span th:text="${currentUser}">user</span>
                    </span>
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <button class="btn btn-sm btn-outline-light" type="submit">Выйти</button>
                    </form>
                </li>
                <!-- Not logged in -->
                <li class="nav-item" th:unless="${isAuthenticated}">
                    <a class="btn btn-sm btn-outline-light" th:href="@{/login}">
                        <i class="fas fa-sign-in-alt me-1"></i>Войти
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
