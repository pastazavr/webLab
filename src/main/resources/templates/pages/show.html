<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head th:replace="~{fragments/head :: head(${page.title})}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="page-hero text-white text-center py-5" style="background:linear-gradient(135deg,#2c1810,#8c6239);">
    <div class="container py-3">
        <h1 class="display-5 fw-bold mb-2" style="font-family:'Playfair Display',serif;" th:text="${page.title}">Заголовок</h1>
        <p class="lead opacity-75 mb-0 small">
            Опубликовано:
            <span th:text="${#temporals.format(page.createdAt, 'dd.MM.yyyy')}">01.01.2024</span>
        </p>
    </div>
</div>

<main class="container py-5 flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <!-- Admin actions -->
            <div class="d-flex gap-2 mb-4" th:if="${isAdmin}">
                <a th:href="@{/admin/pages/{id}/edit(id=${page.id})}" class="btn btn-sm btn-outline-secondary">
                    <i class="fas fa-edit me-1"></i>Редактировать
                </a>
                <form th:action="@{/admin/pages/{id}/delete(id=${page.id})}" method="post" class="d-inline"
                      onsubmit="return confirm('Удалить эту страницу?')">
                    <button class="btn btn-sm btn-outline-danger" type="submit">
                        <i class="fas fa-trash me-1"></i>Удалить
                    </button>
                </form>
                <a th:href="@{/admin/pages}" class="btn btn-sm btn-outline-dark">
                    <i class="fas fa-list me-1"></i>Все страницы
                </a>
            </div>

            <!-- Page content rendered as HTML -->
            <article class="dynamic-page-content">
                <div th:utext="${page.content}">Содержимое страницы</div>
            </article>

            <hr class="my-5"/>
            <div class="d-flex justify-content-between align-items-center text-muted small">
                <a th:href="@{/}" class="text-decoration-none text-muted">
                    <i class="fas fa-arrow-left me-1"></i>На главную
                </a>
                <span th:if="${page.updatedAt != null}">
                    Обновлено: <span th:text="${#temporals.format(page.updatedAt, 'dd.MM.yyyy')}">01.01.2024</span>
                </span>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
